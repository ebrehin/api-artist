spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:test}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:monMotDePasseSuperSecret}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=8083

# fallback vers API scrapping si artiste absent en base locale
scrapping.api.base-url=${SCRAPPING_API_BASE_URL:http://info-tpsi.univ-brest.fr:10062}
scrapping.api.artist-by-nom-path=${SCRAPPING_API_ARTIST_BY_NOM_PATH:/api/scrap/artist?nom={nom}}

# Configuration OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
